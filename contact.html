<body>
    <header>
        <div class="item">
            <!-- This displays the logo at the top of the page central -->
            <!-- <div class="header-background"><</div> -->
            <div class="container flexbox">
                <nav>
                <!-- This shows that the following within the tag take the user to differnt pages -->

                        <!-- Sets text to heading two -->
                        <li><a href="about.html" > About </a></li>

    <form>
            <h2> Contact Me </h2>
            <h3> In the boxes below please provide contact details and we will get back to you</h3>
            <br>
            <div class="contact-page ">
        <!-- Credit to ssbalakumar on codepen.io at https://codepen.io/ssbalakumar/pen/uzDIA?editors=1100 where the orginla code was altered from-->
                <div class="flexbox contact-box">
                    <input placeholder="Your name" type="text" tabindex="1" required>
                    <!-- Sets the input placeholder and type as well as tab index-->
                </div>
                <br>
                <div class=" flexbox contact-box">
                    <input placeholder="Your Email Address" type="email" tabindex="2" required>
                    <!-- Sets the input placeholder and type as well as tab index-->
                </div>
                <br>
                <div class="flexbox contact-box">
                    <input placeholder="Your Phone Number" type="tel" tabindex="3" required>
                    <!-- Sets the input placeholder and type as well as tab index-->
                </div>
                <br>
                <div class="flexbox contact-box">
                    <input placeholder="Company Name" type="url" tabindex="4" required>
                    <!-- Sets the input placeholder and type as well as tab index-->
                </div>
                <br>
                <div class="flexbox contact-box">
                    <textarea placeholder="Type your Message Here...." tabindex="5" required></textarea>
                    <!-- Sets the input placeholder and type as well as tab index-->
                </div>
                <br>
                <div class="flexbox contact-box">
                        <input type="submit" tabindex="6">
                        <!-- Sets the submit box and tab index -->
                </div>
            </div>
        </form>
